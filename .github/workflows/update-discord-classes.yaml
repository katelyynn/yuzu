name: update classes

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [update_class]

permissions:
  contents: write

jobs:
  class-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - id: update
        uses: metro420yt/class-update@v1
        with:
          ext: css
          diff: "https://raw.githubusercontent.com/SyndiShanX/Update-Classes/main/Changes.txt"

      - uses: EndBug/add-and-commit@v10
        if: ${{steps.update.outputs.changed || steps.update.outputs.totalChanges > 0}}
        with:
          default_author: github_actions
          message: "chore: classes"
          fetch: true
